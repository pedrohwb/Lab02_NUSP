version: 2

sources:
  - name: silver
    schema: silver
    description: >
      Camada Silver — dados limpos e normalizados carregados pelo pipeline Python
      a partir do arquivo Excel Online Retail II.
    tables:
      - name: online_retail_ii
        description: "Transações de varejo online após limpeza e padronização."
        columns:
          - name: invoice
            description: "Número da nota fiscal (prefixo 'C' indica cancelamento)."
            tests:
              - not_null
          - name: stock_code
            description: "Código do produto."
            tests:
              - not_null
          - name: description
            description: "Descrição do produto."
            tests:
              - not_null
          - name: quantity
            description: "Quantidade de itens na transação."
            tests:
              - not_null
          - name: invoice_date
            description: "Data e hora da transação."
            tests:
              - not_null
          - name: price
            description: "Preço unitário do item (positivo)."
            tests:
              - not_null
          - name: customer_id
            description: "Identificador do cliente (pode ser nulo para vendas anônimas)."
          - name: country
            description: "País do cliente."
            tests:
              - not_null
          - name: source_sheet
            description: "Aba de origem no arquivo Excel."
          - name: is_canceled
            description: "TRUE se a nota foi cancelada."
            tests:
              - not_null
          - name: gross_revenue
            description: "Receita bruta = quantity × price."
            tests:
              - not_null
          - name: invoice_year
            description: "Ano extraído da data da nota."
          - name: invoice_month
            description: "Mês extraído da data da nota."
          - name: invoice_year_month
            description: "Ano-mês extraído da data da nota (ex: 2010-12)."
